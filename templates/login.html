<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lyoptimus — Simulator Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #416a82; --accent: #6a8a9d; --ice: #e2e8ec;
    --text: #2a4a5e; --muted: #5a6a7e; --white: #fff;
    --border: rgba(65,106,130,0.15);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--ice); min-height: 100vh; display: flex; flex-direction: column; }
  nav { background: var(--white); border-bottom: 0.5px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; }
  .logo-wrap { display: inline-block; background: var(--white); border-radius: 6px; padding: 4px 10px; }
  .logo-wrap img { height: 36px; width: auto; display: block; }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .card { background: var(--white); border: 0.5px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(65,106,130,0.1); }
  .card-header { text-align: center; margin-bottom: 2rem; }
  .card-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 500; color: var(--navy); margin-bottom: 0.5rem; }
  .card-header p { font-size: 13px; color: var(--muted); }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.03em; margin-bottom: 5px; }
  input { width: 100%; padding: 10px 14px; border: 0.5px solid var(--border); border-radius: 6px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); background: #f9fbfd; transition: border-color 0.2s; }
  input:focus { outline: none; border-color: var(--navy); background: var(--white); }
  .btn { width: 100%; padding: 12px; background: var(--navy); color: var(--white); border: none; border-radius: 6px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
  .btn:hover { background: var(--accent); }
  .error { background: #fde8e8; color: #b83232; border: 0.5px solid rgba(184,50,50,0.2); border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
  .error.visible { display: block; }
  footer { background: var(--navy); padding: 1rem 2rem; text-align: center; }
  footer p { font-size: 12px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo-wrap"><img src="/static/logo.jpg" alt="Lyoptimus"/></a>
</nav>
<div class="main">
  <div class="card">
    <div class="card-header">
      <h1>Simulator access</h1>
      <p>Enter your credentials to access the Primary Drying Calculator</p>
    </div>
    <div class="error" id="errorMsg">Invalid username or password. Please try again.</div>
    <form onsubmit="doLogin(event)">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>
</div>
<footer>
  <p>&copy; 2025 Lyoptimus Thermodynamics S.L.</p>
</footer>
<script>
async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.classList.remove('visible');

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (data.success) {
      window.location.href = data.redirect;
    } else {
      errorMsg.classList.add('visible');
    }
  } catch(e) {
    errorMsg.textContent = 'Could not connect to server. Please try again.';
    errorMsg.classList.add('visible');
  }
}
</script>
</body>
</html>
